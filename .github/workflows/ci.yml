name: Ci

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test
    runs-on: macos-latest
    strategy:
      matrix:
        xcode: ['26.1']
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Find iOS Simulator
        id: sim
        run: |
          DEST_ID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys

          data = json.load(sys.stdin)
          preferred_names = ['iPhone 16 Pro', 'iPhone 16', 'iPhone 15 Pro', 'iPhone 15']
          choices = []

          for runtime, devices in data['devices'].items():
              if not runtime.startswith('com.apple.CoreSimulator.SimRuntime.iOS-'):
                  continue

              version_bits = runtime.rsplit('iOS-', 1)[-1].split('-')
              try:
                  version = tuple(int(bit) for bit in version_bits)
              except ValueError:
                  continue

              for device in devices:
                  if not device.get('isAvailable', False):
                      continue

                  name = device['name']
                  if 'iPhone' not in name:
                      continue

                  try:
                      preference = preferred_names.index(name)
                  except ValueError:
                      preference = len(preferred_names)

                  choices.append((preference, tuple(-part for part in version), name, device['udid']))

          if not choices:
              raise SystemExit('No available iOS simulator found')

          choices.sort()
          print(choices[0][3])
          ")
          echo "dest_id=$DEST_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$DEST_ID" || true
          xcrun simctl bootstatus "$DEST_ID" -b

      - name: Run tests on iOS Simulator
        run: |
          xcodebuild test \
            -scheme ImageCache \
            -destination "id=${{ steps.sim.outputs.dest_id }}" \
            CODE_SIGNING_ALLOWED=NO
